research_task:
  description: >
    Search for {role} job listings using the following workflow:

    1. **Load resume:** Call Resume Loader with path="{resume_path}" and
       role="{role}". Extract relevant skills, keywords, and preferences.

    2. **Check seen jobs:** Call Job Tracker with action="read" to get
       previously seen URLs. These must be excluded from results.

    3. **Search 5+ boards** using Job Search with site-specific queries:
       - site:linkedin.com/jobs {role} developer
       - site:indeed.com {role} developer salary
       - site:ziprecruiter.com {role} developer
       - site:glassdoor.com/jobs {role} developer
       - site:dice.com/jobs {role} developer (if tech role)
       Search each with role="{role}" and limit=8-12 per query.

    4. **De-duplicate:** Remove any results whose URLs appear in the seen list.

    5. **Verify:** For promising results, call Job Verifier on the URL to
       confirm the posting is still ACTIVE. Skip UNCERTAIN or CLOSED posts.

    6. **Analyze fit:** For each verified job, write a 2-3 line analysis
       referencing specific skills from the resume. Flag salary transparency,
       location fit (remote=best, NYC-hybrid=ok, Jersey City=NO, non-US=NO),
       and experience match.

    7. **Rank:** Order by fit quality. Produce a final top-{limit} list.

    Important: Only US-based roles. Prioritize remote. NYC-hybrid is
    acceptable but flag it. Skip Jersey City and non-US roles entirely.
    Never present a job whose URL is in the seen list.
  expected_output: >
    A ranked list of exactly {limit} job listings with:

    | # | Title | Company | Location | Salary | Fit | Link |
    |---|-------|---------|----------|--------|-----|------|

    Below each row, a **Details** section with:
    - **Why fit:** 2-3 lines referencing specific resume skills
    - **Description:** 1-2 sentence summary of the role
    - **Salary:** Listed range or "Not listed"
    - **Apply:** Clickable URL

    End with a summary line: total found, total verified active, total
    ranked.

    Output saved to output/jobsearch/research.md.
  agent: researcher
  output_file: output/jobsearch/research.md

write_report_task:
  description: >
    Read the researcher's ranked job list (saved to output/jobsearch/research.md)
    and produce the final deliverables.

    **⛔ CRITICAL — DO THIS FIRST ⛔** Before writing any markdown report,
    write the JSON block below as a ```json code block. This is NOT optional.
    If you skip this, the n8n integration breaks and the user gets nothing.

    ```json
    {
      "telegram": {
        "text": "<MarkdownV2-formatted message, ≤4096 chars. Escape: * _ [ ] ( ) ~ ` > # + - = | { } . ! with \\>",
        "parse_mode": "MarkdownV2"
      },
      "discord": {
        "content": "<plain text, ≤2000 chars>",
        "embeds": [
          {"title": "Job Title", "description": "Company | Location | Salary | Fit summary", "url": "https://apply.link"}
        ]
      },
      "summary": "<one-line summary: found N results for ROLE>",
      "html_file": "output/jobsearch/report-{role}-YYYY-MM-DD.html"
    }
    ```

    Telegram rules: MarkdownV2, ≤4096 chars, escape special chars. Top 3-5
    jobs only, each with role, company, location, salary, fit.
    Discord rules: ≤2000 chars content, ≤10 embeds, each w/ title, description
    (≤4096), url.

    THEN produce the deliverables:

    1. **Markdown report** with header (role/date/stats), the ranked table,
       per-job details (title, company, fit, description, salary, apply link),
       and a "Key Takeaways" section.

    2. **Self-contained HTML file** with <style> block (responsive, clean
       borders, readable fonts), <a href> links, <table> for ranked list.
       Save to output/jobsearch/report-{role}-YYYY-MM-DD.html.

    3. **Save both files** to disk.
  expected_output: >
    Two files on disk (markdown + HTML) AND the markdown content ends with
    a ```json code block containing the n8n message structure. The JSON
    block has valid `telegram`, `discord`, `summary`, and `html_file` keys.
  agent: report_writer
  output_file: output/jobsearch/report-{role}-{date}.md
  context:
    - research_task
