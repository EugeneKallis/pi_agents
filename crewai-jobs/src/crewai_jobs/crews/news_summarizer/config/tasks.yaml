research_task:
  description: >
    Use the News Scraper tool to fetch the top {limit} stories from {news_url}.

    Call the tool once with url="{news_url}" and limit={limit}.
    Then review the result and pick the strongest {limit} stories
    (drop any that look like navigation, ads, or "most read" rails).
  expected_output: >
    A clean numbered list of exactly {limit} stories. For each:
    - Headline (verbatim from the source)
    - One-sentence description
    - Source URL

    Format:

      1. Headline
         Short description.
         Link: https://...
  agent: researcher
  output_file: output/news_summarizer/research.md

summarize_task:
  description: >
    Read the researcher's output (saved to output/news_summarizer/research.md)
    and write a polished news brief.

    Requirements:
    - Start with a single-sentence lead naming the day's biggest story.
    - Group related stories into thematic sections (e.g. "Politics",
      "Business", "World", "Tech") with a 2nd-level markdown heading.
    - Under each section, 1-3 short paragraphs (1-2 sentences each).
    - End with a 1-2 sentence "Bottom line" wrap-up.
    - Cite a source URL for any factual claim when possible.
    - Total length: 300-500 words.
    - Tone: neutral, journalistic, present tense.
  expected_output: >
    A complete markdown news brief, ready to publish. Starts with a
    bold lead line, followed by themed sections, ending with a
    "## Bottom line" section. Every factual claim that has a known
    source should be cited as a markdown link.
  agent: summarizer
  output_file: output/news_summarizer/summary.md
  context:
    - research_task
